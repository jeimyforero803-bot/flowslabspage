  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo { width: 180px; margin-bottom: 2.5rem; }
    .icon {
      width: 72px; height: 72px;
      background: rgba(249,115,22,0.12);
      border: 2px solid rgba(249,115,22,0.4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(249,115,22,0.3); }
      50%      { box-shadow: 0 0 0 16px rgba(249,115,22,0); }
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
    }
    h1 span { color: #F97316; }
    p {
      color: rgba(255,255,255,0.65);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 480px;
      margin: 0 auto 2rem;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #F97316;
      color: #000;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 14px 32px;
      border-radius: 100px;
      text-decoration: none;
      transition: transform .2s, box-shadow .2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(249,115,22,0.4); }
    .timer {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PDG7HH2R" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <img src="LOGOS/LOGO COMPLETO 2.png" alt="FlowsLabs" class="logo">

  <div class="icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#F97316" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>

  <h1>MENSAJE <span>RECIBIDO</span></h1>
  <p>
    Gracias por contactarnos. Nuestro equipo revisará tu solicitud y te escribirá en menos de <strong style="color:#F97316">24 horas</strong> con una propuesta personalizada.
  </p>

  <a href="https://flowslabssas.com" class="btn">
    Volver al inicio
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </a>

  <p class="timer">Serás redirigido automáticamente en <span id="cd">8</span> segundos...</p>

  <script>
    let s = 8;
    const el = document.getElementById('cd');
    const t = setInterval(() => {
      s--;
      el.textContent = s;
      if (s <= 0) { clearInterval(t); window.location.href = 'https://flowslabssas.com'; }
    }, 1000);
  </script>
</body>
